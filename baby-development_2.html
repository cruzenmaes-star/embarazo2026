<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Development</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: Georgia, serif;
    background: linear-gradient(160deg, #fff5fb, #f3eeff, #eef8ff);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1 {
    font-size: 1.6rem;
    background: linear-gradient(90deg, #e91e8c, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    margin-bottom: 4px;
  }
  .subtitle { color:#aaa; font-size:0.78rem; text-align:center; margin-bottom:16px; }
  .card {
    width:100%; max-width:600px;
    background:white; border-radius:24px;
    overflow:hidden; box-shadow:0 12px 50px rgba(0,0,0,0.12);
    margin-bottom:14px;
  }
  .img-wrap { position:relative; width:100%; height:320px; overflow:hidden; background:#f0e8f0; }
  .slides { display:flex; width:200%; height:100%; transition:transform 0.4s ease; }
  .slides img { width:50%; height:100%; object-fit:cover; flex-shrink:0; }
  .slide-dots { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
  .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.5); cursor:pointer; transition:background 0.2s; }
  .dot.active { background:white; }
  .slide-btn { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.75); border:none; border-radius:50%; width:32px; height:32px; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:bold; color:#555; }
  .slide-btn.left { left:8px; }
  .slide-btn.right { right:8px; }
  .badge { position:absolute; top:12px; left:12px; background:rgba(255,255,255,0.92); border-radius:999px; padding:5px 14px; font-size:0.75rem; font-weight:bold; color:#555; }
  .info { padding:16px 18px; }
  .month-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:2px; font-weight:bold; margin-bottom:4px; }
  .title { font-size:1.3rem; color:#2d2d2d; margin-bottom:6px; }
  .date { font-size:0.73rem; color:#bbb; margin-bottom:10px; }
  .stats { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .stat { background:#f9f9f9; border-radius:10px; padding:6px 12px; text-align:center; font-size:0.82rem; font-weight:bold; }
  .summary { color:#555; font-size:0.85rem; line-height:1.8; margin-bottom:12px; }
  .milestones { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:14px; }
  .milestone { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; font-size:0.78rem; color:#444; }
  .m-num { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:0.6rem; font-weight:bold; flex-shrink:0; }
  .size-box { border-radius:16px; padding:14px 16px; display:flex; align-items:center; gap:14px; margin-top:4px; }
  .size-emoji { font-size:52px; line-height:1; flex-shrink:0; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.12)); }
  .size-text { flex:1; }
  .size-title { font-size:0.65rem; text-transform:uppercase; letter-spacing:1.5px; font-weight:bold; margin-bottom:4px; }
  .size-compare { font-size:1.05rem; font-weight:bold; color:#2d2d2d; margin-bottom:3px; }
  .size-desc { font-size:0.78rem; color:#888; line-height:1.45; }
  .nav { display:flex; gap:12px; justify-content:center; align-items:center; width:100%; max-width:600px; margin-bottom:12px; }
  .nav button { padding:11px 28px; border-radius:999px; border:none; font-weight:bold; font-size:0.88rem; cursor:pointer; transition:all 0.2s; font-family:Georgia,serif; }
  .nav button:disabled { background:#f0f0f0; color:#ccc; cursor:not-allowed; box-shadow:none !important; }
  .counter { padding:11px 20px; border-radius:999px; font-weight:bold; font-size:0.88rem; }
  .footer { color:#ddd; font-size:0.68rem; text-align:center; }
</style>
</head>

let sel=0, slideIdx=0;

function updateSlides() {
  const imgs=IMGS[sel], container=document.getElementById('slides');
  const dots=document.getElementById('dots');
  const leftBtn=document.getElementById('slideLeft'), rightBtn=document.getElementById('slideRight');
  container.style.width=(imgs.length*100)+'%';
  container.innerHTML=imgs.map(src=>`<img src="${src}" style="width:${100/imgs.length}%;height:100%;object-fit:cover;flex-shrink:0;"/>`).join('');
  slideIdx=0; container.style.transform='translateX(0)';
  if(imgs.length>1){
    dots.style.display='flex';
    dots.innerHTML=imgs.map((_,i)=>`<div class="dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`).join('');
    leftBtn.style.display='flex'; rightBtn.style.display='flex';
  }else{dots.style.display='none';leftBtn.style.display='none';rightBtn.style.display='none';}
}

function goSlide(i){
  const imgs=IMGS[sel]; slideIdx=Math.max(0,Math.min(i,imgs.length-1));
  document.getElementById('slides').style.transform=`translateX(-${(100/imgs.length)*slideIdx}%)`;
  document.querySelectorAll('.dot').forEach((d,idx)=>d.classList.toggle('active',idx===slideIdx));
}

function slideImg(dir){goSlide(slideIdx+dir);}

function render(){
  const d=data[sel], c=d.color;
  updateSlides();
  document.getElementById('badge').textContent=`Month ${d.month} • Weeks ${d.weeks}`;
  document.getElementById('monthLabel').style.color=c;
  document.getElementById('monthLabel').textContent=`Month ${d.month} of 9`;
  document.getElementById('title').textContent=d.title;
  document.getElementById('date').textContent='📅 '+d.date;
  document.getElementById('size').textContent='📏 '+d.size;
  document.getElementById('size').style.color=c;
  document.getElementById('weight').textContent='⚖️ '+d.weight;
  document.getElementById('weight').style.color=c;
  const tri=sel<3?'1st Trimester':sel<6?'2nd Trimester':'3rd Trimester';
  document.getElementById('trimester').textContent=tri;
  document.getElementById('trimester').style.color=c;
  document.getElementById('summary').textContent=d.summary;
  document.getElementById('milestones').innerHTML=d.milestones.map((m,i)=>`
    <div class="milestone" style="background:${c}10;border:1px solid ${c}20">
      <div class="m-num" style="background:${c}">${i+1}</div><span>${m}</span>
    </div>`).join('');
  const box=document.getElementById('sizeBox');
  box.style.background=c+'0e'; box.style.border=`1px solid ${c}25`;
  document.getElementById('sizeTitleLabel').style.color=c;
  document.getElementById('sizeEmoji').textContent=d.sizeEmoji;
  document.getElementById('sizeCompare').textContent=d.sizeCompare;
  document.getElementById('sizeDesc').textContent=d.sizeDesc;
  document.getElementById('counter').textContent=`${d.month} / 9`;
  document.getElementById('counter').style.background=c+'18';
  document.getElementById('counter').style.color=c;
  document.getElementById('card').style.border=`1px solid ${c}25`;
  document.getElementById('card').style.boxShadow=`0 12px 50px ${c}22`;
  ['prevBtn','nextBtn'].forEach((id,idx)=>{
    const btn=document.getElementById(id), disabled=idx===0?sel===0:sel===8;
    btn.disabled=disabled;
    if(!disabled){btn.style.background=c;btn.style.color='white';btn.style.boxShadow=`0 4px 14px ${c}44`;}
    else{btn.style.background='#f0f0f0';btn.style.color='#ccc';}
  });
}

function go(dir){const n=sel+dir;if(n<0||n>8)return;sel=n;render();}
render();
